<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE GILDED ABYSS – SCHOOL EDITION</title>

  <!-- ✅ THREE.JS – CDN OFFICIEL, COMPATIBLE GITHUB PAGES -->
  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"
          integrity="sha384-npZp8J+gLp2RpR8n3sYPPdHfR5k1pVHXrW6mZJcRa+qOkp+J6z+u95l5B+ONjW1L"
          crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Segoe UI, Tahoma, sans-serif;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.85);
      color: gold;
      padding: 14px;
      border: 2px solid gold;
      border-radius: 10px;
      z-index: 10;
      min-width: 180px;
    }

    #intro-layer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 100;
      transition: opacity 2s;
    }

    #intro-text {
      max-width: 80%;
      line-height: 1.6;
      font-style: italic;
      font-size: 1.3em;
      opacity: 0;
      transition: opacity 1.5s;
    }

    #death-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(140,0,0,0.9);
      color: white;
      text-align: center;
      padding-top: 150px;
      z-index: 200;
    }

    .btn {
      background: gold;
      color: black;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro-layer">
  <div>
    <h2 id="intro-text"></h2>
  </div>
</div>

<!-- 💀 MORT -->
<div id="death-screen">
  <h1>💀 VOUS ÊTES MORT</h1>
  <button class="btn" onclick="respawn()">RESPAWN</button>
</div>

<!-- 🧾 UI -->
<div id="ui">
  <b id="p-name">Vagabond</b><br>
  💰 OR : <span id="p-gold">150</span><br>
  ⭐ LVL : <span id="p-lvl">1</span>
  <hr>
  <small>Z Q S D : Bouger</small>
</div>

<script>
/* ======================
   VÉRIFICATION CRITIQUE
====================== */
if (typeof THREE === "undefined") {
  document.body.innerHTML =
    "<h1 style='color:red; padding:20px;'>ERREUR : Three.js non chargé</h1>";
  throw new Error("Three.js non chargé");
}

/* ======================
   DONNÉES JOUEUR
====================== */
let player = {
  name: "Élève",
  gold: 150,
  lvl: 1,
  x: 0,
  z: 0
};

let scene, camera, renderer, cube;
let isDead = false;

/* ======================
   INTRO (OPTION 2)
====================== */
const introMessages = [
  "Lorsque le monde se fissura, l'Abîme se réveilla…",
  "Des biomes oubliés émergèrent de l'obscurité.",
  "Chaque terre cache une menace différente.",
  "Vagabond… avance, ou disparaît."
];

let introIndex = 0;

function runIntro() {
  const el = document.getElementById("intro-text");

  if (introIndex < introMessages.length) {
    el.style.opacity = 0;
    setTimeout(() => {
      el.textContent = introMessages[introIndex++];
      el.style.opacity = 1;
      setTimeout(runIntro, 3500);
    }, 800);
  } else {
    document.getElementById("intro-layer").style.opacity = 0;
    setTimeout(() => {
      document.getElementById("intro-layer").remove();
      revealWorld();
      startGame();
    }, 2000);
  }
}

/* ======================
   THREE.JS
====================== */
function init3D() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050707);
  scene.fog = new THREE.Fog(0x050707, 8, 35);

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  const sun = new THREE.DirectionalLight(0xffddaa, 1.3);
  sun.position.set(10, 20, 10);
  scene.add(sun);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshLambertMaterial({ color: 0x2f3b26 })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  cube = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshLambertMaterial({ color: 0x3366ff })
  );
  cube.position.set(0, 0.5, 0);
  scene.add(cube);

  animate();
}

function revealWorld() {
  scene.background = new THREE.Color(0x87ceeb);
  scene.fog = new THREE.Fog(0x87ceeb, 15, 60);
}

function animate() {
  requestAnimationFrame(animate);
  if (cube) {
    camera.position.lerp(
      new THREE.Vector3(cube.position.x, 5, cube.position.z + 8),
      0.1
    );
    camera.lookAt(cube.position);
  }
  renderer.render(scene, camera);
}

/* ======================
   JEU
====================== */
function startGame() {
  player.name = localStorage.getItem("name") || prompt("Nom du vagabond ?") || "Élève";
  localStorage.setItem("name", player.name);
  init3D();
  updateUI();
}

window.addEventListener("keydown", e => {
  if (!cube || isDead) return;
  const s = 0.5;
  if (e.key === "z") cube.position.z -= s;
  if (e.key === "s") cube.position.z += s;
  if (e.key === "q") cube.position.x -= s;
  if (e.key === "d") cube.position.x += s;
});

function respawn() {
  isDead = false;
  cube.position.set(0, 0.5, 0);
  document.getElementById("death-screen").style.display = "none";
}

function updateUI() {
  document.getElementById("p-name").textContent = player.name;
  document.getElementById("p-gold").textContent = player.gold;
  document.getElementById("p-lvl").textContent = player.lvl;
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* 🚀 LANCEMENT */
window.onload = runIntro;
</script>

</body>
</html>
