<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GILDED ABYSS - SCHOOL EDITION</title>

<!-- ✅ THREE.JS (CORRECT) -->
<script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.85);
  color: gold;
  padding: 15px;
  border: 2px solid gold;
  border-radius: 10px;
  z-index: 10;
}

#intro-layer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  color: white;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

#intro-text {
  max-width: 80%;
  font-style: italic;
  font-size: 1.3em;
  line-height: 1.6;
  opacity: 0;
  transition: opacity 1.5s;
}

#death-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(160,0,0,0.85);
  color: white;
  text-align: center;
  padding-top: 150px;
  z-index: 100;
}

.btn {
  background: gold;
  color: black;
  padding: 12px 24px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro-layer">
  <h2 id="intro-text"></h2>
</div>

<!-- 💀 MORT -->
<div id="death-screen">
  <h1>💀 VOUS ÊTES MORT</h1>
  <button class="btn" onclick="respawn()">RESPAWN</button>
</div>

<!-- 🧾 UI -->
<div id="ui">
  <b id="p-name">Vagabond</b><br>
