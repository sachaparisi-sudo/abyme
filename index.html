<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GILDED ABYSS - SCHOOL EDITION</title>
    <!-- Chargement du moteur 3D -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: gold; padding: 15px; border: 2px solid gold; border-radius: 10px; min-width: 180px; pointer-events: none; z-index: 10; }
        #death-screen { display: none; position: absolute; width: 100%; height: 100%; background: rgba(180,0,0,0.9); text-align: center; color: white; padding-top: 150px; z-index: 100; }
        .btn { background: gold; color: black; padding: 12px 24px; border: none; cursor: pointer; font-weight: bold; margin: 10px; border-radius: 5px; pointer-events: all; }
        #intro-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: opacity 2s; }
        #admin-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 3px solid red; padding: 30px; color: #00ff00; z-index: 200; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <!-- CINÉMATIQUE D'INTRODUCTION -->
    <div id="intro-layer">
        <h2 id="intro-text" style="font-style: italic; max-width: 80%; line-height: 1.6; opacity: 0; transition: opacity 1.5s;"></h2>
    </div>

    <!-- ECRAN DE MORT -->
    <div id="death-screen">
        <h1>💀 VOUS ÊTES MORT DANS L'ABÎME</h1>
        <p>Vous avez perdu 100 Pièces d'Or.</p>
        <button class="btn" onclick="respawn()">RESPAWN (-100 OR)</button>
        <button class="btn" style="background:white;" onclick="window.open('https://paypal.me')">PAYER 0.50€ (SAUVER L'OR)</button>
    </div>

    <!-- PANEL ADMIN SECRET (TOUCHE K) -->
    <div id="admin-panel">
        <h2 style="color: red;">👑 PANEL MAÎTRE (SACHA)</h2>
        <button class="btn" onclick="adminAddGold()">🎁 RESTAURER +100 OR</button> <br>
        <button class="btn" onclick="document.getElementById('admin-panel').style.display='none'">FERMER</button>
    </div>

    <!-- INTERFACE JOUEUR -->
    <div id="ui">
        <b id="p-name" style="font-size: 20px;">Vagabond</b> <br>
        💰 OR : <span id="p-gold">150</span> <br>
        ⭐ LVL : <span id="p-lvl">1</span> <br>
        <hr style="border: 0.5px solid #444;">
        <small>Z,Q,S,D : Bouger</small>
    </div>

    <script>
        // --- 1. DONNÉES ET SAUVEGARDE ---
        let player = { name: "Joueur", gold: 150, lvl: 1, x: 0, z: 0 };
        const ADMIN_PASS = "ABYME2024";

        function loadGame() {
            const saved = localStorage.getItem('abyme_save_v2');
            if (saved) player = JSON.parse(saved);
            else player.name = prompt("Ton nom de Vagabond ?") || "Élève";
            updateUI();
            init3D();
        }

        function saveGame() {
            localStorage.setItem('abyme_save_v2', JSON.stringify(player));
        }

        // --- 2. CINÉMATIQUE ---
        const messages = [
            "Depuis des siècles, l'Abîme Doré était en paix...",
            "Mais une Ombre s'est levée. Un Monstre sans nom dévore le monde.",
            "Voyageur, tu es notre dernier espoir.",
            "Atteins le Niveau 3 pour affronter le Néant.",
            "L'Abîme t'observe..."
        ];

        let msgIdx = 0;
        function runIntro() {
            const el = document.getElementById('intro-text');
            if (msgIdx < messages.length) {
                el.style.opacity = 0;
                setTimeout(() => {
                    el.innerText = messages[msgIdx];
                    el.style.opacity = 1;
                    msgIdx++;
                    setTimeout(runIntro, 4000);
                }, 1000);
            } else {
                document.getElementById('intro-layer').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('intro-layer').remove();
                    loadGame();
                }, 2000);
            }
        }

        // --- 3. MOTEUR 3D ---
        let scene, camera, renderer, myCube;
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 5, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshLambertMaterial({color: 0x3d4531}));
            floor.rotation.x = -Math.PI/2; scene.add(floor);

            myCube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({color: 0x0088ff}));
            myCube.position.y = 0.5; scene.add(myCube);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(myCube) {
                camera.position.lerp(new THREE.Vector3(myCube.position.x, 5, myCube.position.z + 8), 0.1);
                camera.lookAt(myCube.position);
            }
            renderer.render(scene, camera);
        }

        // --- 4. CONTRÔLES ---
        window.addEventListener('keydown', (e) => {
            if(document.getElementById('death-screen').style.display === 'block') return;
            const s = 0.5;
            if(e.key.toLowerCase() === "z") myCube.position.z -= s;
            if(e.key.toLowerCase() === "s") myCube.position.z += s;
            if(e.key.toLowerCase() === "q") myCube.position.x -= s;
            if(e.key.toLowerCase() === "d") myCube.position.x += s;
            if(e.key.toLowerCase() === "k") {
                if(prompt("Pass Admin :") === ADMIN_PASS) document.getElementById('admin-panel').style.display='block';
            }
            // Simuler mort pour test (touche M)
            if(e.key.toLowerCase() === "m") triggerDeath();
            updateUI();
        });

        function triggerDeath() {
            document.getElementById('death-screen').style.display = 'block';
            player.gold = Math.max(0, player.gold - 100);
            saveGame();
            updateUI();
        }

        function respawn() {
            document.getElementById('death-screen').style.display = 'none';
            myCube.position.set(0, 0.5, 0);
        }

        function adminAddGold() { player.gold += 100; saveGame(); updateUI(); alert("Or restauré !"); }

        function updateUI() {
            document.getElementById('p-name').innerText = player.name;
            document.getElementById('p-gold').innerText = player.gold;
            document.getElementById('p-lvl').innerText = player.lvl;
        }

        window.onload = runIntro;
    </script>
</body>
</html>
